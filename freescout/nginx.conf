# Set the $real_scheme variable to the value of the X-Forwarded-Proto header, if present.
map $http_x_forwarded_proto $real_scheme {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
    listen {{NGINX_LISTEN_PORT}};
    root {{NGINX_WEBROOT}}/public;
    index index.php;

    # If there's a file on the file system serve it up, otherwise send the request
    # to index.php
    location / {
      try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
      fastcgi_param X_AUTH_USER $http_remote_user;
      
      include /etc/nginx/snippets/php-fpm.conf;
      try_files $uri =404;
      fastcgi_split_path_info ^(.+\.php)(/.+)$;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_index index.php;
      include fastcgi_params;
    }

    location ~* ^/storage/attachment/ {
      expires 1M;
      access_log off;
      try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* ^/(?:css|js)/.*\.(?:css|js)$ {
      expires 2d;
      access_log off;
      add_header Cache-Control "public, must-revalidate";
    }

    location ~* ^/(?:css|fonts|img|installer|js|modules|[^\\\]+\..*)$ {
      expires 1M;
      access_log off;
      add_header Cache-Control "public";
    }

    location ~ /\. {
      deny  all;
    }

    ### Don't edit past here
    include /etc/nginx/snippets/site_optimization.conf;
    include /etc/nginx/snippets/exploit_protection.conf;
}
